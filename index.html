<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width , initial-scale=1.0">

    <title>Neon Terminal</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>
    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- TITLE -->
        <h1 class="game-title">
            NEON TERMINAL
        </h1>

        <!-- SUBTITLE -->
        <p class="subtitle">
            Last Signal Detected...
        </p>
        
        <!-- STORY PANEL -->
        <div class="story-panel">

            <p id="story-text"></p>

        </div>

        <!-- INPUT -->
        <input
            type="text"
            id="typing-input"
            placeholder="Awating input..."
            disabled

        >

        <!-- START BUTTON -->
        <button id="start-btn">
            START 
        </button>

        <!-- RESTART BUTTON -->
        <button id="restart-btn">
            RESTART 
        </button>        

        <!-- FOOTER -->
        <div class="footer-text">

            <p id="system-status">
                System Status: STANDBY
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
